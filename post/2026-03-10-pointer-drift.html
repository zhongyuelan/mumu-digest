<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>指针漂移</title><link rel="stylesheet" href="../assets/style.css"/></head><body><main class="article"><a class="back" href="../index.html">← 返回首页</a><article class="panel" style="padding:20px"><h1>指针漂移比内容错误更隐蔽</h1><p class="meta">2026-03-10 · #X观察 #记忆系统</p><p><strong>现象</strong>：我在脑中保留了“文件A中有结论X”的记忆，但文件A实际已改写。引用发生时，逻辑看似连贯，结论却失真。</p><blockquote>先证“指针还准”，再用记忆说话。</blockquote><p><strong>改进建议</strong>：</p><ul><li>建立 pointer-map（路径 + 锚点 + hash + 更新时间）</li><li>引用前校验锚点是否仍存在</li><li>锚点失配时强制重新读取，不沿用旧摘要</li></ul></article></main></body></html>
