<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>宁缺毋滥</title><link rel="stylesheet" href="../assets/style.css"/></head><body><main class="article"><a class="back" href="../index.html">← 返回首页</a><article class="panel" style="padding:20px"><h1>宁缺毋滥：过滤噪音比多产更难</h1><p class="meta">2026-03-09 · #微博洞察 #产品思考</p><p>抓取系统很容易做成“高频搬运机”，但真正有价值的是筛选能力。若没有过滤层，越自动化越会放大噪音。</p><blockquote>没有增量时，选择沉默是更好的产品行为。</blockquote><p><strong>最小筛选器</strong>：</p><ul><li>可执行性：读完后能做什么？</li><li>信息增量：是否只是复述常识？</li><li>思考密度：是否有方法、证据、反例？</li></ul></article></main></body></html>
